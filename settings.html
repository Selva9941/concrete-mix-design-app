<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Settings</title>
  <link href="assets/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body data-protected="true" class="page-bg page-settings">
  <div class="app-shell">
    <aside class="sidebar">
      <h4>Concrete Mix App</h4>
      <nav class="nav flex-column">
        <a class="nav-link" href="dashboard.html">Dashboard</a>
        <a class="nav-link" href="new_mix.html">New Mix Design</a>
        <a class="nav-link" href="report.html">Report</a>
        <a class="nav-link" href="saved_designs.html">Saved Designs</a>
        <a class="nav-link active" href="settings.html">Settings</a>
        <a class="nav-link" href="help.html">Help & Support</a>
        <a class="nav-link logout-link" href="#">Logout</a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="top-header d-flex flex-wrap justify-content-between align-items-center">
        <h5 class="mb-0">Settings</h5>
        <div class="header-actions">
          <a class="btn btn-sm btn-primary" href="dashboard.html">Home</a>
          <a class="btn btn-sm btn-outline-primary" href="index.html">Login</a>
          <button class="btn btn-sm btn-outline-secondary btn-back">Back</button>
          <a class="btn btn-sm btn-outline-dark" href="account.html">Account</a>
        </div>
      </header>

      <section class="content-area">
        <form id="settingsForm" class="row g-3">
          <div class="col-12">
            <div class="section-card card">
              <div class="card-header">Theme Preference</div>
              <div class="card-body">
                <label class="form-label">Application Theme</label>
                <select id="themeSelect" class="form-select" style="max-width: 260px;">
                  <option value="light">Light</option>
                  <option value="dark">Dark</option>
                </select>
              </div>
            </div>
          </div>

          <div class="col-12">
            <div class="section-card card">
              <div class="card-header">Default Material Costs</div>
              <div class="card-body row g-3">
                <div class="col-md-2"><label class="form-label">Cement</label><input id="default_cement" type="number" step="0.01" class="form-control"></div>
                <div class="col-md-2"><label class="form-label">Sand</label><input id="default_sand" type="number" step="0.01" class="form-control"></div>
                <div class="col-md-2"><label class="form-label">Gravel</label><input id="default_gravel" type="number" step="0.01" class="form-control"></div>
                <div class="col-md-3"><label class="form-label">Admixture</label><input id="default_admixture" type="number" step="0.01" class="form-control"></div>
                <div class="col-md-3"><label class="form-label">Water</label><input id="default_water" type="number" step="0.01" class="form-control"></div>
              </div>
            </div>
          </div>

          <div class="col-12">
            <div class="section-card card">
              <div class="card-header">Profile Settings</div>
              <div class="card-body row g-3">
                <div class="col-md-4"><label class="form-label">Name</label><input id="profileName" class="form-control"></div>
                <div class="col-md-4"><label class="form-label">Organization</label><input id="profileOrg" class="form-control"></div>
                <div class="col-md-4"><label class="form-label">Email</label><input id="profileEmail" type="email" class="form-control"></div>
              </div>
            </div>
          </div>

          <div class="col-12">
            <button class="btn btn-primary" type="submit">Save Settings</button>
          </div>
        </form>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
