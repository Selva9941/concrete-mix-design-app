<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Concrete Mix Design App - Login</title>
  <link href="assets/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-page">
  <div class="login-wrap">
    <div class="login-card p-4">
      <h3 class="mb-1 login-title">Concrete Mix Design System</h3>
      <p class="text-muted mb-4">Smart tool for concrete mix calculations</p>
      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <div class="input-group login-input-group">
            <span class="input-group-text" aria-hidden="true">&#9993;</span>
            <input id="email" type="email" class="form-control" placeholder="Enter email" required>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <div class="input-group login-input-group">
            <span class="input-group-text" aria-hidden="true">&#128274;</span>
            <input id="password" type="password" class="form-control" placeholder="Enter password" required>
          </div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-primary login-btn w-100" type="submit">Login</button>
          <button class="btn btn-outline-secondary btn-back" type="button">Back</button>
        </div>
      </form>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
